name: dart_mcp_server
description: >-
  An MCP server for Dart projects, exposing various developer tools to AI
  models.
version: 1.0.0-wip
environment:
  sdk: ^3.12.0

dependencies:
  args: ^2.7.0
  async: ^2.13.0
  cli_util: ^0.5.0
  collection: ^1.19.1
  dart_mcp: ^0.5.0
  dds_service_extensions: ^2.0.1
  devtools_shared: ^12.0.0
  dtd: ^4.0.0
  file: ^7.0.1
  http: ^1.3.0
  json_rpc_2: ^4.0.0
  meta: ^1.16.0
  mime: ^2.0.0
  package_config: ^2.2.0
  path: ^1.9.1
  pool: ^1.5.1
  process: ^5.0.3
  stream_channel: ^2.1.4
  unified_analytics: ^8.0.2
  vm_service: ^15.0.0
  watcher: ^1.1.1
  web_socket: ^1.0.1
  yaml: ^3.1.3

dev_dependencies:
  analyzer: ^13.0.0
  dart_flutter_team_lints: ^3.2.1
  fake_async: ^1.3.3
  pub_semver: ^2.2.0
  test: ^1.25.15
  test_descriptor: ^2.0.2
  test_process: ^2.1.1

executables:
  dart_mcp_server: dart_mcp_server

workspace:
  - lib/src/third_party/language_server_protocol
