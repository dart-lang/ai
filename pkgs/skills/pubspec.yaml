name: skills
description: >
  CLI that installs AI agent skills from your Dart and Flutter package
  dependencies into your Agent, so Antigravity, Claude, Codex, Cursor, and other
  assistants know how to use your stack.
version: 1.0.0-beta.4
repository: https://github.com/dart-lang/ai/tree/main/pkgs/skills
issue_tracker: https://github.com/dart-lang/ai/issues?q=is%3Aissue+is%3Aopen+label%3Apackage%3Askills

executables:
  skills:

environment:
  sdk: ^3.10.0

dependencies:
  args: ^2.7.0
  cli_util: ^0.5.1
  collection: ^1.19.1
  crypto: ^3.0.7
  glob: ^2.1.0
  http: ^1.6.0
  io: ^1.0.5
  logging: ^1.3.0
  meta: ^1.18.2
  package_config: ^3.0.0
  path: ^1.9.0
  unified_analytics: ^8.0.16
  yaml: ^3.1.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
  test_descriptor: ^2.0.0
