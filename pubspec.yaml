name: skills
description: >
  CLI that installs AI agent skills from your Dart and Flutter package
  dependencies into your IDE, so Antigravity, Cursor, Claude, and other
  assistants know how to use your stack.
version: 0.1.5
repository: https://github.com/serverpod/skills
issue_tracker: https://github.com/serverpod/skills/issues

executables:
  skills:

environment:
  sdk: ^3.11.0

dependencies:
  args: ^2.7.0
  config: ^0.8.0
  glob: ^2.1.0
  package_config: ^2.1.0
  path: ^1.9.0
  yaml: ^3.1.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
  test_descriptor: ^2.0.0
